{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <form method="post" enctype="multipart/form-data" class="card shadow-sm mb-4">
      <div class="card-body">
        <h5 class="card-title">Search products or content</h5>

        <div class="mb-3">
          <input name="query"
                 class="form-control form-control-lg"
                 placeholder="E.g. 'best budget gaming laptop'"
                 value="{{ query }}"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Select image:</label>
          <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-1">
            <input type="file" name="file" accept="image/*">
            <button type="submit">Upload</button>
          </div>
        </div>

        <button class="btn btn-lg btn-primary">Run agent</button>
      </div>
    </form>

    {% if filename %}
        <h2>Preview:</h2>
        <img src="{{ url_for('static', filename='uploads/' + filename) }}" style="max-width: 300px;">
    {% endif %}
    {% if response %}
        <h2>Results:</h2>
        <p>{{ response }}</p>
    {% endif %}
  </div>
</div>
{% endblock %}
