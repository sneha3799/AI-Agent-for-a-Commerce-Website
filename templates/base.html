<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Ecommence AI Agent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>

  <body>
    <nav class="top-nav">
      <div class="container">
        <div class="nav-inner">
          <a href="/" class="brand">
            <div>
              <span class="brand-logo">Ecommerce<span>AI</span></span>
              <span class="brand-sub">Intelligent Product Discovery</span>
            </div>
          </a>
          <!-- <span class="nav-tagline">AI-powered product discovery</span> -->
        </div>
      </div>
    </nav>

    <main class="container main-content">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="border-radius:12px; margin-top:1rem;">
              {{ msg }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>Built with CLIP + pgvector + GPT-4o</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
